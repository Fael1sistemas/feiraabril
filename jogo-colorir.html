<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorir para relaxar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f4f8;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.08) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(155, 89, 182, 0.08) 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #2c3e50;
        }
        h1 {
            font-size: 2.2rem; font-weight: 800; color: #2c3e50;
            margin-bottom: 8px; text-align: center; letter-spacing: -0.5px;
        }
        .subtitle { font-size: 1rem; color: #7f8c8d; margin-bottom: 25px; text-align: center; }
        .container {
            display: flex; flex-wrap: wrap; gap: 25px;
            justify-content: center; align-items: flex-start;
            max-width: 1200px; width: 100%;
        }
        .desenho-wrapper {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            flex: 1 1 400px; max-width: 550px; min-width: 300px;
        }
        #area-desenho {
            width: 100%; display: flex; justify-content: center; align-items: center;
            min-height: 400px; background: #fafbfc; border-radius: 15px;
            border: 2px dashed #e1e8ed; position: relative; overflow: hidden;
        }
        #area-desenho svg { width: 100%; height: auto; max-height: 450px; animation: aparecer 0.5s ease-out; }
        @keyframes aparecer { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        #area-desenho svg path, #area-desenho svg circle, #area-desenho svg rect,
        #area-desenho svg ellipse, #area-desenho svg polygon {
            cursor: pointer; transition: fill 0.15s ease, filter 0.2s ease, transform 0.2s ease;
            stroke: #bdc3c7; stroke-width: 1.5;
        }
        #area-desenho svg path:hover, #area-desenho svg circle:hover, #area-desenho svg rect:hover,
        #area-desenho svg ellipse:hover, #area-desenho svg polygon:hover {
            filter: brightness(0.95) drop-shadow(0 0 8px rgba(0,0,0,0.15));
            transform: scale(1.02); transform-origin: center;
        }
        .painel { display: flex; flex-direction: column; gap: 20px; flex: 0 1 320px; min-width: 280px; }
        .caixa { background: white; border-radius: 20px; padding: 22px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .caixa h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: #34495e; display: flex; align-items: center; gap: 8px; }
        .indicador-cor { display: flex; align-items: center; gap: 15px; padding: 18px; background: #f8f9fa; border-radius: 15px; border: 2px solid #e9ecef; transition: border-color 0.3s ease; }
        .indicador-cor.ativo { border-color: #3498db; }
        .preview-cor { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: background-color 0.3s ease, transform 0.3s ease; flex-shrink: 0; }
        .preview-cor.pulso { animation: pulso 0.4s ease; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .info-cor { display: flex; flex-direction: column; }
        .info-cor span { font-size: 0.85rem; color: #7f8c8d; }
        .info-cor strong { font-size: 1.2rem; color: #2c3e50; font-weight: 700; text-transform: capitalize; }
        .paleta { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cor-btn { width: 100%; aspect-ratio: 1; border: 3px solid transparent; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; position: relative; outline: none; }
        .cor-btn:hover { transform: translateY(-3px) scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .cor-btn.selecionada { border-color: #2c3e50; box-shadow: 0 0 0 4px rgba(44, 62, 80, 0.2); transform: scale(1.1); }
        .cor-btn.selecionada::after { content: '\2713'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.3rem; font-weight: 800; color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
        .botoes { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px 20px; border: none; border-radius: 12px; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .btn:active { transform: translateY(0); }
        .btn-limpar { background: #e74c3c; color: white; }
        .btn-limpar:hover { background: #c0392b; }
        .btn-voltar { background: #95a5a6; color: white; }
        .btn-voltar:hover { background: #7f8c8d; }
        .btn-desenho { background: #ecf0f1; color: #2c3e50; border: 2px solid #bdc3c7; }
        .btn-desenho:hover, .btn-desenho.ativo { background: #3498db; color: white; border-color: #3498db; }
        .grupo-botoes { display: flex; flex-wrap: wrap; gap: 8px; }
        .grupo-botoes .btn-desenho { flex: 1; min-width: 80px; padding: 10px; font-size: 0.85rem; }
        @media (max-width: 768px) {
            h1 { font-size: 1.7rem; }
            .container { flex-direction: column; align-items: center; }
            .desenho-wrapper, .painel { width: 100%; max-width: 100%; flex: none; }
            #area-desenho { min-height: 300px; }
            .grupo-botoes .btn-desenho { min-width: 60px; }
        }
        @media (max-width: 400px) { .paleta { gap: 6px; } .cor-btn { border-radius: 10px; } }
    </style>
</head>

            + '<circle cx="120" cy="350" r="4" fill="#ffffff" />'
            + '<circle cx="280" cy="360" r="8" fill="#ffffff" />'
            + '<circle cx="280" cy="348" r="6" fill="#ffffff" />'
            + '<circle cx="280" cy="372" r="6" fill="#ffffff" />'
            + '<circle cx="268" cy="360" r="6" fill="#ffffff" />'
            + '<circle cx="292" cy="360" r="6" fill="#ffffff" />'
            + '<circle cx="280" cy="360" r="4" fill="#ffffff" />'
            + '</svg>'
        ];

        // ============================================================
        // ELEMENTOS DO DOM
        // ============================================================
        const areaDesenho = document.getElementById('area-desenho');
        const paleta = document.getElementById('paleta');
        const previewCor = document.getElementById('preview-cor');
        const nomeCor = document.getElementById('nome-cor');
        const indicador = document.getElementById('indicador');
        const botoesDesenhos = document.getElementById('botoes-desenhos');

        // ============================================================
        // INICIALIZAR PALETA
        // ============================================================
        function inicializarPaleta() {
            cores.forEach((cor, index) => {
                const btn = document.createElement('button');
                btn.className = 'cor-btn';
                btn.style.backgroundColor = cor.hex;
                btn.title = cor.nome;
                btn.setAttribute('aria-label', 'Cor ' + cor.nome);
                if (index === 0) btn.classList.add('selecionada');
                btn.addEventListener('click', () => selecionarCor(cor.hex, cor.nome, btn));
                paleta.appendChild(btn);
            });
        }

        // ============================================================
        // SELECIONAR COR
        // ============================================================
        function selecionarCor(hex, nome, btnClicado) {
            corSelecionada = hex;
            nomeCorSelecionada = nome;

            previewCor.style.backgroundColor = hex;
            nomeCor.textContent = nome;
            indicador.classList.add('ativo');
            previewCor.classList.remove('pulso');
            void previewCor.offsetWidth;
            previewCor.classList.add('pulso');

            document.querySelectorAll('.cor-btn').forEach(b => b.classList.remove('selecionada'));
            btnClicado.classList.add('selecionada');
        }

        // ============================================================
        // CARREGAR DESENHO
        // ============================================================
        function carregarDesenho(index) {
            desenhoAtual = index;
            areaDesenho.innerHTML = desenhos[index];

            const partesSVG = areaDesenho.querySelectorAll('svg path, svg circle, svg rect, svg ellipse, svg polygon');
            partesSVG.forEach(parte => {
                parte.addEventListener('click', function() {
                    this.style.fill = corSelecionada;
                });
            });

            atualizarBotoesDesenhos();
        }

        // ============================================================
        // LIMPAR DESENHO
        // ============================================================
        function limparDesenho() {
            const partesSVG = areaDesenho.querySelectorAll('svg path, svg circle, svg rect, svg ellipse, svg polygon');
            partesSVG.forEach(parte => {
                parte.style.fill = '#ffffff';
            });
        }

        // ============================================================
        // BOTÕES DE DESENHOS
        // ============================================================
        function inicializarBotoesDesenhos() {
            const nomes = ['Casa', 'Peixe', 'Flor', 'Carro', 'Arvore'];
            nomes.forEach((nome, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-desenho';
                btn.textContent = nome;
                btn.addEventListener('click', () => carregarDesenho(index));
                botoesDesenhos.appendChild(btn);
            });
        }

        function atualizarBotoesDesenhos() {
            const botoes = botoesDesenhos.querySelectorAll('.btn-desenho');
            botoes.forEach((btn, index) => {
                btn.classList.toggle('ativo', index === desenhoAtual);
            });
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        inicializarPaleta();
        inicializarBotoesDesenhos();
        carregarDesenho(0);
    </script>
</body>
</html>
